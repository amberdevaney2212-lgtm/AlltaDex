<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#b7e4d7,#d7f2ff);
display:flex;
justify-content:center;
padding:40px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,260px);
gap:30px;
max-width:1000px;
}

.card{

border-radius:18px;
overflow:hidden;
color:white;
box-shadow:0 12px 30px rgba(0,0,0,.25);
position:relative;
transition:.25s;
}

.card:hover{
transform:scale(1.05);
}

.card.shiny{
animation:shine 4s infinite linear;
}

@keyframes shine{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

.card-header{
display:flex;
justify-content:space-between;
padding:14px;
font-weight:bold;
font-size:18px;
}

.card-image{
padding:10px;
}

.card-image img{
width:100%;
height:150px;
object-fit:cover;
border-radius:14px;
background:white;
}

.card-body{
background:rgba(255,255,255,.9);
color:black;
padding:14px;
}

.move{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:6px;
}

.stats{
display:flex;
gap:20px;
font-weight:bold;
margin-top:8px;
}

.footer{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

.badge{
font-weight:bold;
letter-spacing:1px;
}

.fire{background:linear-gradient(135deg,#ff7b4b,#ffcc5c)}
.water{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.grass{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.ice{background:linear-gradient(135deg,#7de2fc,#b9b6e5)}
.normal{background:linear-gradient(135deg,#bdbdbd,#e0e0e0)}
.flying{background:linear-gradient(135deg,#89f7fe,#66a6ff)}

</style>
</head>

<body>

<div class="container" id="cards"></div>

<script>

const animals=[

{name:"African Lion",species:"Panthera leo",type:"fire",continent:"Africa"},
{name:"Polar Bear",species:"Ursus maritimus",type:"ice",continent:"Arctic"},
{name:"Blue Whale",species:"Balaenoptera musculus",type:"water",continent:"Worldwide"},
{name:"Bald Eagle",species:"Haliaeetus leucocephalus",type:"flying",continent:"North America"},
{name:"Tiger",species:"Panthera tigris",type:"fire",continent:"Asia"},
{name:"Kangaroo",species:"Macropus",type:"grass",continent:"Australia"},
{name:"Penguin",species:"Aptenodytes",type:"ice",continent:"Antarctica"},
{name:"Elephant",species:"Loxodonta",type:"grass",continent:"Africa"}

]

const moves={

fire:["Savannah Roar","Blazing Pounce","Flame Strike"],
water:["Ocean Slam","Tidal Charge","Aqua Surge"],
grass:["Nature Stomp","Leaf Guard","Vine Lash"],
ice:["Frost Bite","Ice Slam","Glacier Guard"],
flying:["Sky Dive","Wind Slash","Talon Strike"],
normal:["Wild Strike","Heavy Charge"]

}

function random(min,max){
return Math.floor(Math.random()*(max-min)+min)
}

function image(name){
return "https://source.unsplash.com/600x400/?"+encodeURIComponent(name+" wildlife animal")
}

function rarity(){
let r=Math.random()

if(r<0.6) return "Common"
if(r<0.85) return "Rare"
if(r<0.97) return "Epic"
return "Legendary"
}

function createCard(a){

let atk=random(30,100)
let def=random(30,100)

let move=moves[a.type][random(0,moves[a.type].length)]

let r=rarity()
let shiny=Math.random()<0.05

let card=document.createElement("div")
card.className="card "+a.type+(shiny?" shiny":"")

card.innerHTML=`

<div class="card-header">
<span>${a.name}</span>
<span>HP ${atk+def}</span>
</div>

<div class="card-image">
<img src="${image(a.name)}">
</div>

<div class="card-body">

<div class="move">
<span>${move}</span>
<span>${random(20,90)}</span>
</div>

<div>${a.species}</div>

<div class="stats">
<span>ATK ${atk}</span>
<span>DEF ${def}</span>
</div>

<div class="footer">
<span>🌍 ${a.continent}</span>
<span class="badge">${r}</span>
</div>

</div>

`

return card

}

const container=document.getElementById("cards")

animals.forEach(a=>{
container.appendChild(createCard(a))
})

</script>

</body>
</html>
