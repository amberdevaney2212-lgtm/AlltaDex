<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#74ebd5,#acb6e5);
}

header{
background:#333;
color:white;
padding:15px;
text-align:center;
font-size:26px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.tab{
padding:10px 20px;
background:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.section{display:none;padding:20px;}
.active{display:block}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:18px;
justify-content:center;
}

/* CARD */

.card{
position:relative;
border-radius:14px;
padding:12px;
color:white;
text-align:center;
overflow:hidden;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,0.35);
}

/* ELEMENT COLORS */

.grass{background:#3edc81;}
.fire{background:#ff7a3d;}
.water{background:#3da5ff;}
.air{background:#a6e1ff;}
.dark{background:#444;}

/* PARTICLE LAYER */

.particles{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
overflow:hidden;
}

/* IMAGE */

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
background:white;
position:relative;
z-index:2;
}

.card h3{
margin:6px 0 0;
position:relative;
z-index:2;
}

/* GRASS PARTICLES */

.grass .particles span{
position:absolute;
width:6px;
height:6px;
background:rgba(255,255,255,0.6);
border-radius:2px;
animation:leafFloat 8s linear infinite;
}

@keyframes leafFloat{
0%{transform:translateY(120px) rotate(0)}
100%{transform:translateY(-40px) rotate(360deg)}
}

/* FIRE PARTICLES */

.fire .particles span{
position:absolute;
width:4px;
height:4px;
background:orange;
border-radius:50%;
animation:ember 3s linear infinite;
}

@keyframes ember{
0%{transform:translateY(120px);opacity:1}
100%{transform:translateY(-20px);opacity:0}
}

/* WATER PARTICLES */

.water .particles span{
position:absolute;
width:5px;
height:5px;
background:rgba(255,255,255,0.6);
border-radius:50%;
animation:bubble 6s linear infinite;
}

@keyframes bubble{
0%{transform:translateY(130px);opacity:0}
30%{opacity:1}
100%{transform:translateY(-30px);opacity:0}
}

/* AIR PARTICLES */

.air .particles span{
position:absolute;
width:20px;
height:2px;
background:rgba(255,255,255,0.5);
animation:wind 4s linear infinite;
}

@keyframes wind{
0%{transform:translateX(-40px)}
100%{transform:translateX(260px)}
}

/* DARK PARTICLES */

.dark .particles span{
position:absolute;
width:8px;
height:8px;
background:rgba(0,0,0,0.5);
border-radius:50%;
animation:shadow 6s linear infinite;
}

@keyframes shadow{
0%{transform:scale(0.5);opacity:0.3}
50%{transform:scale(1.3);opacity:0.6}
100%{transform:scale(0.5);opacity:0.3}
}

</style>
</head>

<body>

<header>🌍 WildDex</header>

<div class="tabs">
<div class="tab" onclick="openTab('log')">Log</div>
<div class="tab" onclick="openTab('catches')">Catches</div>
</div>

<!-- LOG -->

<div id="log" class="section active">

<select id="animalSelect">
<option value="">Select Animal</option>
</select>

<button onclick="logAnimal()">Log Animal</button>

</div>

<!-- CATCHES -->

<div id="catches" class="section">
<div class="grid" id="grid"></div>
</div>

<script>

/* TEST DATABASE */

const animals=[

{name:"Blue Whale",type:"water",image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Bluewhale2.jpg"},
{name:"Tiger",type:"fire",image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg"},
{name:"Bald Eagle",type:"air",image:"https://upload.wikimedia.org/wikipedia/commons/1/1a/Bald_Eagle_Portrait.jpg"},
{name:"Oak Tree Frog",type:"grass",image:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Oak_treefrog.jpg"},
{name:"Lesser Horseshoe Bat",type:"dark",image:"https://upload.wikimedia.org/wikipedia/commons/f/f2/Rhinolophus_hipposideros.jpg"}

]

let logged=JSON.parse(localStorage.getItem("wilddex"))||[]

/* Dropdown */

const select=document.getElementById("animalSelect")

animals.forEach(a=>{
let opt=document.createElement("option")
opt.value=a.name
opt.textContent=a.name
select.appendChild(opt)
})

function logAnimal(){

let name=select.value
if(!name)return

if(logged.find(a=>a.name===name)){
alert("Already logged")
return
}

let animal=animals.find(a=>a.name===name)

logged.push(animal)

localStorage.setItem("wilddex",JSON.stringify(logged))

render()

}

/* PARTICLE GENERATOR */

function particleHTML(){

let html=""

for(let i=0;i<10;i++){

let x=Math.random()*200
let delay=Math.random()*5

html+=`<span style="left:${x}px;animation-delay:${delay}s"></span>`

}

return html
}

/* RENDER */

function render(){

const grid=document.getElementById("grid")

grid.innerHTML=""

logged.forEach(a=>{

let card=document.createElement("div")

card.className=`card ${a.type}`

card.innerHTML=`

<div class="particles">${particleHTML()}</div>

<img src="${a.image}" onerror="this.src=''">

<h3>${a.name}</h3>

`

grid.appendChild(card)

})

}

render()

/* TABS */

function openTab(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
