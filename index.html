<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
font-family:Arial;
margin:0;
padding:20px;
text-align:center;

background:linear-gradient(
180deg,
#87ceeb,
#b9f1ff,
#e8fbff
);

color:#222;
}

/* title */

h1{
font-size:40px;
margin-bottom:10px;
}

/* tabs */

.tabs button{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:white;
cursor:pointer;
font-weight:bold;
box-shadow:0 3px 6px rgba(0,0,0,.15);
}

/* cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{

position:relative;

border-radius:16px;

padding:12px;

overflow:hidden;

color:#111;

transition:.25s;

cursor:pointer;

box-shadow:0 6px 12px rgba(0,0,0,.15);

}

.card:hover{
transform:scale(1.05);
}

/* image */

.imgBox{
height:140px;
width:100%;
border-radius:10px;
overflow:hidden;
background:white;
display:flex;
align-items:center;
justify-content:center;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.placeholder{
font-size:40px;
opacity:.4;
}

/* element colors */

.grass{background:#6edc6e;}
.fire{background:#ff8a5c;}
.water{background:#6cc6ff;}
.ice{background:#bdeaff;}
.flying{background:#b3d4ff;}

/* element icon */

.element{
font-size:24px;
margin-top:6px;
}

/* rarity glow */

.uncommon{box-shadow:0 0 10px #4caf50;}
.rare{box-shadow:0 0 14px #2196f3;}
.epic{box-shadow:0 0 16px #9c27b0;}
.legendary{box-shadow:0 0 20px gold;}

/* effects layer */

.effect{
position:absolute;
inset:0;
pointer-events:none;
opacity:.35;
}

/* grass leaves */

.grass .effect{

background:

radial-gradient(circle at 30% 70%,rgba(255,255,255,.35),transparent),

radial-gradient(circle at 70% 40%,rgba(255,255,255,.35),transparent);

animation:leaf 7s infinite;

}

@keyframes leaf{

0%{transform:translateX(0)}

50%{transform:translateX(8px)}

100%{transform:translateX(0)}

}

/* water shimmer */

.water .effect{

background:

radial-gradient(circle at 30% 30%,rgba(255,255,255,.5),transparent),

radial-gradient(circle at 70% 60%,rgba(255,255,255,.4),transparent);

animation:water 6s infinite;

}

@keyframes water{

0%{transform:translateY(0)}

50%{transform:translateY(6px)}

100%{transform:translateY(0)}

}

/* fire glow */

.fire .effect{

background:

radial-gradient(circle at 50% 80%,rgba(255,120,0,.6),transparent),

radial-gradient(circle at 60% 60%,rgba(255,60,0,.5),transparent);

animation:flame 3s infinite alternate;

}

@keyframes flame{

0%{transform:scale(1)}

100%{transform:scale(1.08)}

}

/* ice sparkle */

.ice .effect{

background:

radial-gradient(circle at 30% 40%,rgba(255,255,255,.6),transparent),

radial-gradient(circle at 70% 70%,rgba(255,255,255,.4),transparent);

animation:frost 5s infinite alternate;

}

@keyframes frost{

0%{opacity:.2}

100%{opacity:.45}

}

/* wind */

.flying .effect{

background:

linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);

background-size:200% 100%;

animation:wind 4s infinite linear;

}

@keyframes wind{

0%{background-position:0}

100%{background-position:200%}

}

/* modal */

.modal{

position:fixed;

inset:0;

background:rgba(0,0,0,.5);

display:none;

align-items:center;

justify-content:center;

}

.modalContent{

background:white;

padding:20px;

border-radius:14px;

max-width:400px;

}

.release{

background:#e53935;

border:none;

color:white;

padding:8px 14px;

border-radius:6px;

cursor:pointer;

}

</style>

</head>

<body>

<h1>WildDex</h1>

<div class="tabs">

<button onclick="showTab('log')">Log</button>

<button onclick="showTab('catches')">Catches</button>

<button onclick="showTab('badges')">Badges</button>

</div>

<div id="logTab">

<input id="search" placeholder="Search animal..." oninput="searchAnimals()">

<div id="suggestions"></div>

</div>

<div id="catchesTab" style="display:none">

<div class="cards" id="cards"></div>

</div>

<div id="badgesTab" style="display:none">

Badges coming soon 🏅

</div>

<div class="modal" id="modal">

<div class="modalContent" id="modalContent"></div>

</div>

<script>

const elementSymbol={

grass:"🌿",

fire:"🔥",

water:"💧",

ice:"❄️",

flying:"🕊"

}

const animals=[

{name:"Blue Whale",scientific:"Balaenoptera musculus",type:"water",continent:"Ocean",rarity:"legendary",atk:95,def:90},

{name:"African Lion",scientific:"Panthera leo",type:"fire",continent:"Africa",rarity:"rare",atk:85,def:70},

{name:"Bengal Tiger",scientific:"Panthera tigris tigris",type:"fire",continent:"Asia",rarity:"rare",atk:90,def:70},

{name:"Polar Bear",scientific:"Ursus maritimus",type:"ice",continent:"Arctic",rarity:"rare",atk:82,def:85},

{name:"Golden Eagle",scientific:"Aquila chrysaetos",type:"flying",continent:"Europe",rarity:"uncommon",atk:65,def:55},

{name:"Giant Panda",scientific:"Ailuropoda melanoleuca",type:"grass",continent:"Asia",rarity:"rare",atk:60,def:80}

]

let catches=JSON.parse(localStorage.getItem("wilddex")||"[]")

function showTab(tab){

logTab.style.display="none"

catchesTab.style.display="none"

badgesTab.style.display="none"

if(tab==="log")logTab.style.display="block"

if(tab==="catches")catchesTab.style.display="block"

if(tab==="badges")badgesTab.style.display="block"

renderCards()

}

function searchAnimals(){

let q=search.value.toLowerCase()

suggestions.innerHTML=""

animals.filter(a=>a.name.toLowerCase().includes(q))

.forEach(a=>{

let b=document.createElement("button")

b.textContent=a.name

b.onclick=()=>{

catches.push(a)

localStorage.setItem("wilddex",JSON.stringify(catches))

alert(a.name+" logged!")

}

suggestions.appendChild(b)

})

}

function wikiImage(name){

return "https://source.unsplash.com/300x200/?"+encodeURIComponent(name+" animal")

}

function renderCards(){

cards.innerHTML=""

catches.forEach(a=>{

let card=document.createElement("div")

card.className=`card ${a.type} ${a.rarity}`

card.innerHTML=`

<div class="effect"></div>

<div class="imgBox">

<img src="${wikiImage(a.name)}"

onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">

<div class="placeholder" style="display:none">🐾</div>

</div>

<div class="element">${elementSymbol[a.type]}</div>

<h3>${a.name}</h3>

<i>${a.scientific}</i>

<p>${a.continent}</p>

<p>ATK ${a.atk} DEF ${a.def}</p>

`

card.onclick=()=>openModal(a)

cards.appendChild(card)

})

}

function openModal(a){

modal.style.display="flex"

modalContent.innerHTML=`

<h2>${a.name}</h2>

<p><i>${a.scientific}</i></p>

<p>${elementSymbol[a.type]}</p>

<p>${a.continent}</p>

<p>ATK ${a.atk}</p>

<p>DEF ${a.def}</p>

<button class="release" onclick="release('${a.name}')">Release Animal</button>

<br><br>

<button onclick="modal.style.display='none'">Close</button>

`

}

function release(name){

catches=catches.filter(a=>a.name!==name)

localStorage.setItem("wilddex",JSON.stringify(catches))

modal.style.display="none"

renderCards()

}

renderCards()

</script>

</body>
</html>
