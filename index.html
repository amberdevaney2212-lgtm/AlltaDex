<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:#0f0f14;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

/* tabs */

.tabs button{
padding:10px 20px;
margin:5px;
background:#222;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
margin-top:20px;
}

.card{
position:relative;
border-radius:14px;
padding:12px;
overflow:hidden;
transition:.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

/* image */

.imgBox{
height:140px;
width:100%;
background:#111;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.placeholder{
font-size:40px;
opacity:.35;
}

/* element colours */

.fire{background:#3a0d0d;}
.water{background:#0a2d46;}
.grass{background:#0d3316;}
.ice{background:#1a2f3c;}
.flying{background:#1f2438;}

/* element symbol */

.elementIcon{
position:absolute;
top:8px;
right:10px;
font-size:20px;
opacity:.9;
}

/* rarity glow */

.uncommon{box-shadow:0 0 10px #4caf50;}
.rare{box-shadow:0 0 12px #2196f3;}
.epic{box-shadow:0 0 16px #9c27b0;}
.legendary{box-shadow:0 0 20px gold;}

/* effects */

.effect{
position:absolute;
inset:0;
pointer-events:none;
opacity:.25;
}

/* fire */

.fire .effect{
background:
radial-gradient(circle at 40% 80%,rgba(255,100,0,.6),transparent 60%),
radial-gradient(circle at 60% 70%,rgba(255,40,0,.6),transparent 60%);
animation:flame 3s infinite alternate;
}

@keyframes flame{
0%{transform:scale(1)}
100%{transform:scale(1.08)}
}

/* water */

.water .effect{
background:
radial-gradient(circle at 30% 30%,rgba(255,255,255,.35),transparent),
radial-gradient(circle at 70% 60%,rgba(255,255,255,.25),transparent);
animation:waterMove 6s infinite linear;
}

@keyframes waterMove{
0%{transform:translateY(0)}
50%{transform:translateY(6px)}
100%{transform:translateY(0)}
}

/* grass */

.grass .effect{
background:
radial-gradient(circle at 30% 70%,rgba(80,255,120,.35),transparent),
radial-gradient(circle at 70% 40%,rgba(120,255,120,.35),transparent);
animation:leaf 7s infinite;
}

@keyframes leaf{
0%{transform:translateX(0)}
50%{transform:translateX(6px)}
100%{transform:translateX(0)}
}

/* ice */

.ice .effect{
background:
radial-gradient(circle at 40% 30%,rgba(200,240,255,.45),transparent),
radial-gradient(circle at 60% 70%,rgba(180,220,255,.35),transparent);
animation:frost 5s infinite alternate;
}

@keyframes frost{
0%{opacity:.2}
100%{opacity:.4}
}

/* flying */

.flying .effect{
background:
linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
background-size:200% 100%;
animation:wind 4s infinite linear;
}

@keyframes wind{
0%{background-position:0}
100%{background-position:200%}
}

/* modal */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
background:#222;
padding:20px;
border-radius:12px;
max-width:400px;
}

.release{
background:#b71c1c;
border:none;
color:white;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>WildDex</h1>

<div class="tabs">
<button onclick="showTab('log')">Log</button>
<button onclick="showTab('catches')">Catches</button>
<button onclick="showTab('badges')">Badges</button>
</div>

<div id="logTab">
<input id="search" placeholder="Search animal..." oninput="searchAnimals()">
<div id="suggestions"></div>
</div>

<div id="catchesTab" style="display:none">

<select id="sort" onchange="renderCards()">
<option value="rarity">Sort by Rarity</option>
<option value="atk">Sort by Attack</option>
<option value="def">Sort by Defense</option>
</select>

<div class="cards" id="cards"></div>

</div>

<div id="badgesTab" style="display:none">
Badges coming soon
</div>

<div class="modal" id="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<script>

/* element symbols */

const elementSymbol={
fire:"🔥",
water:"💧",
grass:"🌿",
ice:"❄️",
flying:"🕊"
}

/* dataset */

const animals=[

{name:"Blue Whale",scientific:"Balaenoptera musculus",type:"water",continent:"Ocean",rarity:"legendary",atk:95,def:90},

{name:"Great White Shark",scientific:"Carcharodon carcharias",type:"water",continent:"Ocean",rarity:"rare",atk:90,def:60},

{name:"African Lion",scientific:"Panthera leo",type:"fire",continent:"Africa",rarity:"rare",atk:85,def:70},

{name:"Bengal Tiger",scientific:"Panthera tigris tigris",type:"fire",continent:"Asia",rarity:"rare",atk:90,def:70},

{name:"Gray Wolf",scientific:"Canis lupus",type:"fire",continent:"North America",rarity:"uncommon",atk:70,def:55},

{name:"Polar Bear",scientific:"Ursus maritimus",type:"ice",continent:"Arctic",rarity:"rare",atk:82,def:85},

{name:"Golden Eagle",scientific:"Aquila chrysaetos",type:"flying",continent:"Europe",rarity:"uncommon",atk:65,def:55},

{name:"Giant Panda",scientific:"Ailuropoda melanoleuca",type:"grass",continent:"Asia",rarity:"rare",atk:60,def:80},

{name:"Red Kangaroo",scientific:"Macropus rufus",type:"grass",continent:"Australia",rarity:"uncommon",atk:65,def:55},

{name:"Snow Leopard",scientific:"Panthera uncia",type:"ice",continent:"Asia",rarity:"rare",atk:82,def:65}

]

/* storage */

let catches=JSON.parse(localStorage.getItem("wilddex")||"[]")

function showTab(tab){

logTab.style.display="none"
catchesTab.style.display="none"
badgesTab.style.display="none"

if(tab==="log")logTab.style.display="block"
if(tab==="catches")catchesTab.style.display="block"
if(tab==="badges")badgesTab.style.display="block"

renderCards()

}

/* search */

function searchAnimals(){

let q=search.value.toLowerCase()

suggestions.innerHTML=""

animals.filter(a=>a.name.toLowerCase().includes(q))
.slice(0,10)
.forEach(a=>{

let btn=document.createElement("button")
btn.textContent=a.name

btn.onclick=()=>{

catches.push(a)
localStorage.setItem("wilddex",JSON.stringify(catches))

alert(a.name+" logged!")

}

suggestions.appendChild(btn)

})

}

/* wikipedia image */

function wikiImage(name){

return "https://en.wikipedia.org/wiki/Special:FilePath/"+encodeURIComponent(name)+".jpg"

}

/* render cards */

function renderCards(){

cards.innerHTML=""

let arr=[...catches]

if(sort.value==="atk")arr.sort((a,b)=>b.atk-a.atk)
if(sort.value==="def")arr.sort((a,b)=>b.def-a.def)

arr.forEach(a=>{

let card=document.createElement("div")

card.className=`card ${a.type} ${a.rarity}`

card.innerHTML=`

<div class="effect"></div>

<div class="elementIcon">${elementSymbol[a.type]}</div>

<div class="imgBox">

<img src="${wikiImage(a.name)}"

onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">

<div class="placeholder" style="display:none">🐾</div>

</div>

<h3>${a.name}</h3>

<i>${a.scientific}</i>

<p>${a.continent}</p>

<p>ATK ${a.atk} DEF ${a.def}</p>

`

card.onclick=()=>openModal(a)

cards.appendChild(card)

})

}

/* modal */

function openModal(a){

modal.style.display="flex"

modalContent.innerHTML=`

<h2>${a.name}</h2>

<p><i>${a.scientific}</i></p>

<p>Element: ${elementSymbol[a.type]}</p>

<p>Continent: ${a.continent}</p>

<p>Attack: ${a.atk}</p>

<p>Defense: ${a.def}</p>

<p>Rarity: ${a.rarity}</p>

<br>

<button class="release" onclick="release('${a.name}')">
Release Animal
</button>

<br><br>

<button onclick="modal.style.display='none'">Close</button>

`

}

/* release */

function release(name){

catches=catches.filter(a=>a.name!==name)

localStorage.setItem("wilddex",JSON.stringify(catches))

modal.style.display="none"

renderCards()

}

renderCards()

</script>

</body>
</html>
