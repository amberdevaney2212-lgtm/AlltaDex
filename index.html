<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildDex Full</title>
<style>
body {font-family: Arial; margin: 0; padding: 20px; background: linear-gradient(#a6f0d8, #d0f7ff);}
h1{font-size:36px;text-align:center;margin-bottom:10px;}
.tabs {display:flex; justify-content:center; gap:10px; margin-bottom:20px;}
.tabs button {padding:10px 20px; border:none; border-radius:20px; background:white; cursor:pointer; font-weight:bold; box-shadow:0 4px 8px rgba(0,0,0,.15);}
.cards {display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px;}
.card {position:relative; border-radius:16px; padding:12px; overflow:hidden; box-shadow:0 6px 12px rgba(0,0,0,.15); transition:.25s; cursor:pointer;}
.card:hover{transform:scale(1.05);}
.imgBox{height:140px;background:white;border-radius:10px;overflow:hidden; display:flex; align-items:center; justify-content:center;}
.imgBox img{width:100%;height:100%;object-fit:cover;}
.placeholder{font-size:40px;opacity:.4; display:flex; align-items:center; justify-content:center; height:100%;}
.element{font-size:24px; margin-top:6px;}
.grass{background:#6de06d;}
.water{background:#63c4ff;}
.fire{background:#ff8750;}
.ice{background:#c8f2ff;}
.flying{background:#b5d5ff;}
.normal{background:#dcdcdc;}
.dark{background:#555;}
.electric{background:#fffb50;}
.poison{background:#a54aff;}
.uncommon{box-shadow:0 0 10px #4caf50;}
.rare{box-shadow:0 0 14px #2196f3;}
.legendary{box-shadow:0 0 20px gold;}
.effect{position:absolute; inset:0; pointer-events:none; opacity:.25; z-index:0;}
.card *{position:relative; z-index:1;}
.grass .effect{background:radial-gradient(circle at 20% 70%,rgba(255,255,255,.6),transparent), radial-gradient(circle at 80% 40%,rgba(255,255,255,.6),transparent); animation:leafMove 6s infinite linear;}
@keyframes leafMove{0%{transform:translateX(0)}50%{transform:translateX(10px)}100%{transform:translateX(0)}}
.water .effect{background:radial-gradient(circle at 40% 40%,rgba(255,255,255,.7),transparent),radial-gradient(circle at 70% 70%,rgba(255,255,255,.5),transparent);animation:waterMove 5s infinite;}
@keyframes waterMove{0%{transform:translateY(0)}50%{transform:translateY(6px)}100%{transform:translateY(0)}}
.fire .effect{background:radial-gradient(circle at 50% 80%,rgba(255,120,0,.8),transparent),radial-gradient(circle at 60% 60%,rgba(255,60,0,.7),transparent);animation:flameMove 3s infinite alternate;}
@keyframes flameMove{0%{transform:scale(1)}100%{transform:scale(1.1)}}
.ice .effect{background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.8),transparent),radial-gradient(circle at 70% 70%,rgba(255,255,255,.6),transparent);animation:frostMove 5s infinite alternate;}
@keyframes frostMove{0%{opacity:.3}100%{opacity:.7}}
.flying .effect{background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);background-size:200% 100%;animation:windMove 4s infinite linear;}
@keyframes windMove{0%{background-position:0}100%{background-position:200%}}
.electric .effect{background:radial-gradient(circle,rgba(255,255,0,.5),transparent);animation:flashMove 2s infinite alternate;}
@keyframes flashMove{0%{opacity:.3}100%{opacity:.7}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;}
.modalContent{background:white;padding:20px;border-radius:14px;max-width:400px;text-align:left;}
.release{background:#e53935;color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;margin-top:10px;}
.badge{background:white;padding:10px;margin:8px;border-radius:12px;display:inline-block;box-shadow:0 3px 6px rgba(0,0,0,.15);}
</style>
</head>
<body>

<div class="tabs">

  <button onclick="showTab('catches')">Catches</button>
  <button onclick="showTab('badges')">Badges</button>

  <div id="suggestions"></div>

      <option value="continent">Continent</option>
    </select>
  </label>
  <div class="cards" id="cards"></div>
</div>

<div id="badgesTab" style="display:none">

</div>

<div class="modal" id="modal">
